<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <title>Danishjeet Singh</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="shortcut icon" href="../assets/logos/logo.svg" type="image/x-icon">
    <script>
      (function() {
        try {
          var choice = localStorage.getItem("theme") || "system";
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = choice === "system" ? (prefersDark ? "dark" : "light") : choice;
          document.documentElement.setAttribute("data-theme", resolved);
          document.documentElement.setAttribute("data-theme-choice", choice);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.setAttribute("data-theme-choice", "system");
        }
      })();
    </script>

    <script>
      (function() {
        var toggle = document.getElementById("theme-toggle");
        var media = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
        var choices = ["system", "light", "dark"];
        var labels = {
          system: "Theme: System",
          light: "Theme: Light",
          dark: "Theme: Dark"
        };
        function applyTheme(choice) {
          var resolved = choice === "system" ? (media && media.matches ? "dark" : "light") : choice;
          document.documentElement.setAttribute("data-theme", resolved);
          document.documentElement.setAttribute("data-theme-choice", choice);
          if (toggle) {
            toggle.setAttribute("aria-label", labels[choice]);
            toggle.setAttribute("title", labels[choice]);
          }
        }

        try {
          var saved = localStorage.getItem("theme") || "system";
          applyTheme(saved);
          if (toggle) {
            toggle.addEventListener("click", function() {
              var current = localStorage.getItem("theme") || "system";
              var choice = choices[(choices.indexOf(current) + 1) % choices.length];
              localStorage.setItem("theme", choice);
              applyTheme(choice);
            });
          }
          if (media && media.addEventListener) {
            media.addEventListener("change", function() {
              if ((localStorage.getItem("theme") || "system") === "system") {
                applyTheme("system");
              }
            });
          }
        } catch (error) {
          applyTheme("system");
        }
      })();
    </script>
  </body>
